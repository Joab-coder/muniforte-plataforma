<svg width="1200" height="1520" viewBox="0 0 1200 1520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&amp;family=IBM+Plex+Mono:wght@500;600&amp;display=swap');
      .word-muni{ font-family:'Arial Rounded MT Bold','Baloo 2', Arial, sans-serif; font-weight:700; }
      .tagline{ font-family:'IBM Plex Mono', 'Courier New', monospace; font-weight:600; letter-spacing:3px; }
      .label{ font-family:'IBM Plex Mono', 'Courier New', monospace; font-size:15px; fill:#8A8577; letter-spacing:1px; }
    </style>
  </defs>

  <rect width="1200" height="1520" fill="#FAF9F6"/>

  <!-- ================= SECTION 1: MONOGRAM ================= -->
  <text x="40" y="50" class="label">MONOGRAMA — MF (letras arredondadas)</text>
  <rect x="40" y="70" width="140" height="140" rx="26" fill="#16424A"/>
  <text x="110" y="163" text-anchor="middle" class="word-muni" font-size="66" fill="#B8842C">MF</text>

  <rect x="210" y="70" width="140" height="140" rx="26" fill="#B8842C"/>
  <text x="280" y="163" text-anchor="middle" class="word-muni" font-size="66" fill="#16424A">MF</text>

  <rect x="380" y="70" width="140" height="140" rx="26" fill="#16424A" stroke="#B8842C" stroke-width="3"/>
  <text x="450" y="163" text-anchor="middle" class="word-muni" font-size="66" fill="#FFFFFF">MF</text>

  <!-- dark bg swatch with reverse monogram -->
  <rect x="550" y="40" width="610" height="170" rx="10" fill="#0F2E33"/>
  <rect x="580" y="70" width="140" height="140" rx="26" fill="#FFFFFF"/>
  <text x="650" y="163" text-anchor="middle" class="word-muni" font-size="66" fill="#16424A">MF</text>
  <text x="750" y="150" class="tagline" font-size="15" fill="#9DBAB8">USO EM FUNDO ESCURO</text>

  <!-- ================= SECTION 2: HORIZONTAL LOCKUP ================= -->
  <text x="40" y="270" class="label">LOCKUP HORIZONTAL — PRINCIPAL</text>
  <rect x="40" y="290" width="90" height="90" rx="18" fill="#16424A"/>
  <text x="85" y="347" text-anchor="middle" class="word-muni" font-size="42" fill="#B8842C">MF</text>
  <text x="150" y="347" class="word-muni" font-size="54" fill="#16424A">Muni<tspan fill="#B8842C">Forte</tspan></text>

  <!-- ================= SECTION 3: ALL CAPS WORDMARK ================= -->
  <text x="40" y="450" class="label">VERSÃO CAIXA ALTA</text>
  <text x="40" y="507" class="word-muni" font-size="54" letter-spacing="1" fill="#16424A">MUNI<tspan fill="#B8842C">FORTE</tspan></text>

  <!-- ================= SECTION 4: FULL LOCKUP WITH TAGLINE ================= -->
  <text x="40" y="600" class="label">LOCKUP COMPLETO — COM ASSINATURA</text>
  <rect x="40" y="620" width="620" height="190" rx="14" fill="#FFFFFF" stroke="#E0DCCF" stroke-width="2"/>
  <rect x="72" y="656" width="100" height="100" rx="20" fill="#16424A"/>
  <text x="122" y="722" text-anchor="middle" class="word-muni" font-size="46" fill="#B8842C">MF</text>
  <text x="195" y="710" class="word-muni" font-size="42" fill="#16424A">Muni<tspan fill="#B8842C">Forte</tspan></text>
  <text x="197" y="748" class="tagline" font-size="15" fill="#566063">CONSULTORIA EM GESTÃO PÚBLICA</text>

  <!-- dark version of full lockup -->
  <rect x="690" y="620" width="470" height="190" rx="14" fill="#16424A"/>
  <rect x="722" y="656" width="100" height="100" rx="20" fill="#FFFFFF"/>
  <text x="772" y="722" text-anchor="middle" class="word-muni" font-size="46" fill="#16424A">MF</text>
  <text x="845" y="710" class="word-muni" font-size="38" fill="#FFFFFF">Muni<tspan fill="#D9A94C">Forte</tspan></text>
  <text x="847" y="748" class="tagline" font-size="14" fill="#9DBAB8">CONSULTORIA EM GESTÃO PÚBLICA</text>

  <!-- ================= SECTION 5: VERTICAL / STACKED LOCKUP ================= -->
  <text x="40" y="870" class="label">LOCKUP VERTICAL (PERFIL, APP ICON, CAPAS)</text>
  <rect x="40" y="890" width="230" height="260" rx="18" fill="#16424A"/>
  <rect x="80" y="930" width="150" height="150" rx="28" fill="#B8842C"/>
  <text x="155" y="1030" text-anchor="middle" class="word-muni" font-size="70" fill="#16424A">MF</text>
  <text x="155" y="1122" text-anchor="middle" class="tagline" font-size="16" fill="#FFFFFF">MUNIFORTE</text>

  <!-- ================= SECTION 6: FAVICON / APP ICON ================= -->
  <text x="330" y="870" class="label">ÍCONE (FAVICON / APP)</text>
  <rect x="330" y="890" width="64" height="64" rx="14" fill="#16424A"/>
  <text x="362" y="932" text-anchor="middle" class="word-muni" font-size="29" fill="#B8842C">MF</text>
  <rect x="410" y="890" width="48" height="48" rx="10" fill="#16424A"/>
  <text x="434" y="922" text-anchor="middle" class="word-muni" font-size="22" fill="#B8842C">MF</text>
  <rect x="474" y="890" width="32" height="32" rx="7" fill="#16424A"/>
  <text x="490" y="911" text-anchor="middle" class="word-muni" font-size="15" fill="#B8842C">MF</text>

  <!-- ================= SECTION 7: COLOR PALETTE REFERENCE ================= -->
  <text x="40" y="1200" class="label">PALETA DE MARCA</text>
  <rect x="40" y="1220" width="110" height="70" rx="8" fill="#16424A"/>
  <text x="40" y="1310" class="tagline" font-size="13" fill="#566063">#16424A</text>
  <text x="40" y="1328" class="tagline" font-size="11" fill="#8A8577">PRIMÁRIA</text>

  <rect x="170" y="1220" width="110" height="70" rx="8" fill="#B8842C"/>
  <text x="170" y="1310" class="tagline" font-size="13" fill="#566063">#B8842C</text>
  <text x="170" y="1328" class="tagline" font-size="11" fill="#8A8577">DOURADO</text>

  <rect x="300" y="1220" width="110" height="70" rx="8" fill="#2C6E76"/>
  <text x="300" y="1310" class="tagline" font-size="13" fill="#566063">#2C6E76</text>
  <text x="300" y="1328" class="tagline" font-size="11" fill="#8A8577">PRIM. CLARA</text>

  <rect x="430" y="1220" width="110" height="70" rx="8" fill="#F5F4EF" stroke="#E0DCCF"/>
  <text x="430" y="1310" class="tagline" font-size="13" fill="#566063">#F5F4EF</text>
  <text x="430" y="1328" class="tagline" font-size="11" fill="#8A8577">FUNDO</text>

  <!-- ================= FOOTER NOTE ================= -->
  <text x="40" y="1440" class="tagline" font-size="13" fill="#8A8577">Fonte do wordmark: Arial Rounded MT Bold (fallback: Baloo 2) · IBM Plex Mono (assinatura e legendas)</text>
  <text x="40" y="1462" class="tagline" font-size="13" fill="#8A8577">Área de proteção mínima: altura do monograma ao redor de toda a marca</text>
</svg>
